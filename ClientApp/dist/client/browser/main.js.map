<div class="p-6 sm:p-8 font-sans bg-white rounded-2xl">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-[var(--color-primary)]">
      {{ isEditMode ? 'Edit Topic' : 'Add New Topic' }}
    </h2>
    <button (click)="close()" class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors cursor-pointer focus:outline-none">
      <mat-icon class="scale-75">close</mat-icon>
    </button>
  </div>

  <div class="mb-8">
    <label class="block text-sm font-medium text-gray-700 mb-2">Topic Name</label>
    <input 
      [formControl]="nameControl"
      type="text" 
      placeholder="e.g., PTSD & Combat Trauma"
      class="w-full px-4 py-3 bg-gray-50 border rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-[var(--color-mint)] focus:border-[var(--color-success)] transition-all duration-200 text-[16px]"
      [ngClass]="nameControl.invalid && nameControl.touched ? 'border-red-500 ring-red-300' : 'border-gray-200'"
      (keyup.enter)="save()"
    >
    @if (nameControl.invalid && nameControl.touched) {
      <p class="text-red-500 text-xs mt-1.5 ml-1">Name is required (min 2 characters).</p>
    }
  </div>

  <div class="flex gap-3 justify-end">
    <button 
      (click)="close()" 
      class="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors cursor-pointer"
    >
      Cancel
    </button>
    <button 
      (click)="save()" 
      class="px-5 py-2.5 rounded-xl text-sm bg-[var(--color-primary)] text-white font-medium hover:bg-[var(--color-success)] hover:shadow-lg transition-all cursor-pointer"
    >
      {{ isEditMode ? 'Save Changes' : 'Create Topic' }}
    </button>
  </div>
</div>
