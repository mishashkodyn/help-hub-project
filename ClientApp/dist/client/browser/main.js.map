<div class="relative inline-block text-left z-50">
  <button
    type="button"
    (click)="toggle()"
    class="group flex items-center gap-1.5 px-3 py-1.5 rounded-lg font-medium text-sm transition-all outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-primary)]/30 cursor-pointer select-none hover:bg-gray-50"
    [ngClass]="isOpen() ? 'text-[var(--color-primary)] bg-[var(--color-primary)]/5' : 'text-gray-700'"
  >
    @if (selected()) {
      <span class="flex items-center gap-1.5">
        @if (icon != null) {
          <mat-icon class="scale-90 text-[var(--color-primary)]">{{ icon() }}</mat-icon>
        }
        <span>{{ selected()?.label }}</span>
      </span>
    } @else {
      <span class="text-gray-500">{{ placeholder() }}</span>
    }
    
    <mat-icon
      class="w-4 h-4 text-gray-400 group-hover:text-[var(--color-primary)] transition-transform duration-300 ease-[cubic-bezier(0.87,_0,_0.13,_1)]"
      [class.rotate-180]="isOpen()"
    >
      keyboard_arrow_down
    </mat-icon>
  </button>

  @if (isOpen()) {
    <div
      class="fixed inset-0 z-40"
      (click)="isOpen.set(false)"
    ></div>

    <div
      class="absolute right-0 mt-2 w-auto min-w-[160px] bg-white/95 backdrop-blur-xl rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-gray-100 p-1 z-50 animate-in fade-in zoom-in-95 duration-150 ease-out"
    >
      <div class="flex flex-col gap-0.5">
        @for (item of items(); track item.value) {
          <button
            (click)="select(item)"
            class="flex items-center justify-between w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-all duration-200 outline-none cursor-pointer"
            [ngClass]="
              selected()?.value === item.value
                ? 'bg-[var(--color-mint)]/20 text-[var(--color-primary)]'
                : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'
            "
          >
            <span>{{ item.label }}</span>
            
            @if (selected()?.value === item.value) {
              <mat-icon class="scale-75 text-[var(--color-primary)]">check</mat-icon>
            }
          </button>
        }
      </div>
    </div>
  }
</div>
