name: Build and Deploy to VPS

on:
  push:
    branches:
      - maste
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >>${GITHUB_ENV}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker build -f Dockerfile.backend -t ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/help-hub-api:latest .
          docker push ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/help-hub-api:latest

      - name: Build and Push Frontend
        run: |
          docker build -f Dockerfile.frontend -t ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/help-hub-client:latest .
          docker push ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/help-hub-client:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            cd /opt/helphub
            
            docker compose pull api client
            docker compose up -d --remove-orphans